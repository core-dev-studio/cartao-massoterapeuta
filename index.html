<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vinícius Brito | Massoterapeuta</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --ocean: #132a36;
            --sand: #d4a373;
            --silk: #fefae0;
            --glass: rgba(255, 255, 255, 0.04);
            --open: #81c784;
            --closed: #e57373;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #1a3a4a, #0d1b2a);
            font-family: 'Quicksand', sans-serif;
            color: var(--silk);
            overflow: hidden;
        }

        /* Controle de Áudio Sutil */
        .audio-toggle {
            position: absolute;
            top: 25px;
            right: 25px;
            background: none;
            border: none;
            color: var(--sand);
            font-size: 1.1rem;
            cursor: pointer;
            z-index: 10;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .container { z-index: 1; width: 100%; max-width: 360px; padding: 20px; transition: filter 0.3s ease; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 55px 20px 55px 20px; 
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        /* Foto Liquid Integral */
        .profile-wrapper {
            width: 135px;
            height: 135px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            animation: liquid-border 8s ease-in-out infinite;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(212, 163, 115, 0.2);
        }

        @keyframes liquid-border {
            0%, 100% { border-radius: 45% 55% 70% 30% / 45% 55% 60% 40%; }
            50% { border-radius: 60% 40% 35% 65% / 55% 65% 45% 55%; }
        }

        .status-tag { display: inline-flex; align-items: center; gap: 8px; font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 20px; padding: 5px 15px; border-radius: 30px; background: rgba(0,0,0,0.2); }
        .dot { width: 7px; height: 7px; border-radius: 50%; }
        .pulse { animation: pulse-anim 2s infinite; }
        @keyframes pulse-anim { 0% { box-shadow: 0 0 0 0px rgba(129, 199, 132, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(129, 199, 132, 0); } 100% { box-shadow: 0 0 0 0px rgba(129, 199, 132, 0); } }

        h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 400; margin-bottom: 5px; font-style: italic; }
        .subtitle { font-size: 0.75rem; letter-spacing: 3px; color: var(--sand); margin-bottom: 30px; display: block; }

        .btn { display: block; width: 100%; padding: 17px; margin-bottom: 12px; border-radius: 22px; text-decoration: none; color: var(--silk); background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 163, 115, 0.15); transition: 0.3s; font-size: 0.9rem; cursor: pointer; text-align: center; }
        .primary { background: var(--sand); color: var(--ocean); font-weight: 600; border: none; }

        /* Modal Suave */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 20; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal { background: #1a2f3a; width: 85%; max-width: 310px; padding: 35px 25px; border-radius: 40px; text-align: center; border: 1px solid var(--sand); animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .modal h2 { font-family: 'Playfair Display', serif; margin-bottom: 15px; color: var(--sand); }
        .modal p { font-size: 0.9rem; line-height: 1.6; margin-bottom: 25px; }
        .btn-close { background: var(--sand); color: var(--ocean); border: none; padding: 10px; border-radius: 12px; cursor: pointer; font-weight: 600; width: 100%; }
    </style>
</head>
<body onclick="playOnce()">

    <audio id="bgMusic" loop>
        <source src="relax.mp3" type="audio/mpeg">
    </audio>

    <button class="audio-toggle" onclick="toggleAudio(event)" id="audioBtn">🔊</button>

    <div class="container" id="content">
        <div class="card">
            <div class="profile-wrapper">
                <img src="vini.webp" alt="Vinícius Brito" class="profile-img">
            </div>

            <div class="status-tag">
                <div id="dot" class="dot"></div>
                <span id="statusTxt">Carregando...</span>
            </div>
            
            <h1>Vinícius Brito</h1>
            <span class="subtitle">MASSOTERAPEUTA • 10 ANOS</span>

            <div class="menu">
                <a href="https://wa.me/5548998530573" class="btn primary" target="_blank">Agendar Sessão</a>
                <div class="btn" onclick="openModal()">Atendimento em Casa</div>
                <a href="https://www.instagram.com/viniciusmterapia/" class="btn" target="_blank">Instagram</a>
                <div class="btn" onclick="copyPix()" id="pix">Copiar PIX</div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <h2>Bem-estar em casa</h2>
            <p>Para sua melhor experiência, sugerimos o uso de roupas confortáveis e a escolha de um ambiente calmo para o seu atendimento.</p>
            <button class="btn-close" onclick="closeModal()">Entendido</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        let hasStarted = false;

        function playOnce() {
            if (!hasStarted) {
                audio.play();
                hasStarted = true;
            }
        }

        function toggleAudio(e) {
            e.stopPropagation();
            if (audio.paused) {
                audio.play();
                document.getElementById('audioBtn').innerText = '🔊';
            } else {
                audio.pause();
                document.getElementById('audioBtn').innerText = '🔇';
            }
        }

        function checkTime() {
            const h = new Date().getHours();
            const d = document.getElementById('dot');
            const t = document.getElementById('statusTxt');
            if (h >= 9 && h < 22) {
                d.style.background = 'var(--open)'; d.classList.add('pulse');
                t.innerText = 'Disponível agora';
            } else {
                d.style.background = 'var(--closed)'; d.classList.remove('pulse');
                t.innerText = 'Fechado no momento';
            }
        }

        function openModal() {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('content').style.filter = 'blur(6px)';
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('content').style.filter = 'none';
        }

        function copyPix() {
            navigator.clipboard.writeText("74991097643");
            const btn = document.getElementById('pix');
            btn.innerText = "Copiado!";
            setTimeout(() => { btn.innerText = "Copiar PIX"; }, 2000);
        }

        checkTime();
    </script>
</body>
</html>
